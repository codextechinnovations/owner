<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a4e" />
    <meta name="description" content="ManageYourPG - PG Management System for Property Owners" />
    <title>ManageYourPG - PG Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Lato', sans-serif; background-color: #F8F9FF; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      window.__startupErrors = [];
      window.onerror = function(msg, url, line, col, err) {
        window.__startupErrors.push(String(msg) + (err && err.stack ? ('\n' + err.stack) : '') + ' at ' + url + ':' + line + ':' + col);
        var box = document.getElementById('root-error-display');
        if (!box) {
          box = document.createElement('div');
          box.id = 'root-error-display';
          box.style.cssText = 'padding:24px;font-family:monospace;color:#991b1b;background:#fee2e2;white-space:pre-wrap;';
          document.body.appendChild(box);
        }
        box.textContent = 'STARTUP ERROR:\n' + window.__startupErrors.join('\n---\n');
      };
      window.addEventListener('error', function(e) {
        if (e && e.error) window.onerror(e.message, e.filename, e.lineno, e.colno, e.error);
      });
    </script>
  </body>
</html>
